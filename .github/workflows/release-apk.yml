name: Build & release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Android SDK platforms
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 platform-tools'

      - name: Cache scraped product images
        id: img-cache
        uses: actions/cache@v4
        with:
          path: site_bundle/images
          # Bust the cache whenever the canonical image list changes.
          key: site-images-${{ hashFiles('site_bundle/images.json') }}

      - name: Install Python deps
        run: pip install -r requirements.txt pillow

      - name: Download scraped images (skipped if cache hit)
        if: steps.img-cache.outputs.cache-hit != 'true'
        run: python scraper/download_images.py

      - name: Generate launcher icons
        run: python scraper/make_icons.py

      - name: Build static site bundle
        run: python scraper/build_site.py

      - name: Install Node deps
        run: npm ci || npm install

      - name: Capacitor sync (android)
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK with version + commit
        id: rename
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME#v}"
          SHA="${GITHUB_SHA:0:7}"
          OUT="dist/middletown-tractor-${VERSION}-${SHA}.apk"
          cp android/app/build/outputs/apk/debug/app-debug.apk "$OUT"
          echo "apk=$OUT" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          ls -lh "$OUT"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Middletown Tractor App ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.rename.outputs.apk }}

      - name: Upload APK as workflow artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: middletown-tractor-apk
          path: ${{ steps.rename.outputs.apk }}
